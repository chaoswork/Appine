name: Build and Release

# 推送 v1.0.0 这样的 tag 时才会触发自动编译
on:
  push:
    tags:
      - 'v*'

# 显式赋予 GITHUB_TOKEN 写权限，以便创建 release 和上传 asset
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest # 使用 GitHub 提供的 Mac 服务器

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Emacs
        # This action installs Emacs and makes it available in the PATH.
        # It handles the dependencies for different Emacs versions.
        uses: purcell/setup-emacs@master
        with:
          version: '29.1' # Specify the Emacs version you need

      - name: Locate emacs-module.h
        run: |
          # 1. 获取 Emacs 的安装根目录 (比如 /nix/store/...-emacs-29.1)
          EMACS_PREFIX=$(dirname $(dirname $(which emacs)))
          EMACS_INCLUDE_DIR="$EMACS_PREFIX/include"

          # 2. 检查推导的目录中是否存在头文件
          if [ ! -f "$EMACS_INCLUDE_DIR/emacs-module.h" ]; then
            echo "Not found in $EMACS_INCLUDE_DIR, searching in $EMACS_PREFIX..."
            # 尝试全局搜索
            FOUND_PATH=$(find "$EMACS_PREFIX" -name "emacs-module.h" | head -n 1)
            if [ -n "$FOUND_PATH" ]; then
              EMACS_INCLUDE_DIR=$(dirname "$FOUND_PATH")
            else
              EMACS_INCLUDE_DIR=""
            fi
          fi

          # 3. 终极兜底：如果本地确实没有（被发行版精简了），则自动下载
          if [ -z "$EMACS_INCLUDE_DIR" ] || [ ! -f "$EMACS_INCLUDE_DIR/emacs-module.h" ]; then
            echo "emacs-module.h not found locally. Downloading from Emacs mirror..."
            curl -s -O https://raw.githubusercontent.com/emacs-mirror/emacs/emacs-29/src/emacs-module.h
            EMACS_INCLUDE_DIR="."
          fi

          # 4. 导出环境变量给下一步的 make 使用
          echo "EMACS_INCLUDE_DIR=$EMACS_INCLUDE_DIR" >> $GITHUB_ENV
          echo "Successfully located emacs-module.h at: $EMACS_INCLUDE_DIR"

      - name: Build Universal Binary
        run: |
          make EMACS_INCLUDE_DIR="${EMACS_INCLUDE_DIR}"
          # 打印一下架构信息，确认是否同时包含了 x86_64 和 arm64
          lipo -info appine-module.dylib

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: appine-module.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}